version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: medrecords-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: medrecords
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d medrecords"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medrecords-backend
    environment:
      DATABASE_URL: postgresql://user:pass@postgres:5432/medrecords
      FRONTEND_ORIGIN: http://localhost:5173
      CONTRACT_ADDRESS: ${CONTRACT_ADDRESS:-0x0000000000000000000000000000000000000000}
      SEPOLIA_CHAIN_ID: ${SEPOLIA_CHAIN_ID:-11155111}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
